<!DOCTYPE html>
<html lang="zh-TW">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>獅諾物流</title>

        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
    </head>

    <body>
        <!-- ✅ Lightbox -->
        <div id="lightbox">
            <img id="lightbox-img">
        </div>

        <div id="header"></div>

        <section class="slider">
            <div class="slides">
                <img src="index-1.webp" class="slide active">
                <img src="index-2.webp" class="slide">
                <img src="index-3.webp" class="slide">
                <img src="index-4.webp" class="slide">
                <img src="index-5.webp" class="slide">
            </div>

            <button class="prev">&#10094;</button>
            <button class="next">&#10095;</button>
        </section>

        <section class="pre-main-content">
            <h1>專業物流・值得信賴</h1>
            <p>我們提供<span class="highlight">專業且高效</span>的物流服務，確保您的貨物<span class="highlight">準時且安全</span>到達目的地。</p>
            <p>我們擁有多年的經驗和先進的運輸系統，讓您無後顧之憂。</p>
        </section>

        <section class="main-content">
            <!--
             中文名稱 | 英文縮寫 | 說明
            ---------+---------+------------------------------
             貨物運送 | DLV     | Delivery
             拆箱定位 | DPP     | Disassembly + Positioning + Placement
             拆裝貨櫃 | CNB     | Container / Box / Bundle
             貨物寄存 | STO     | Storage
             家具組裝 | ASM     | Assembly
             商業空間 | CSP     | Commercial Space
            -->

            <div class="service-section" id="service-DLV">
                <div class="service-top">
                    <div class="service-image-container">
                        <img src="service-DLV.webp" alt="貨物運送" class="service-image">
                    </div>
                    <div class="service-text">
                        <h2>貨物運送</h2>
                        <p>提供安全快速的物流配送服務，確保貨物準時送達。</p>
                    </div>
                </div>
                <div class="media-row">
                    <div class="media-item" data-src="service-DLV-1.mp4"></div>
                    <div class="media-item" data-src="service-DLV-2.webp"></div>
                    <div class="media-item" data-src="service-DLV-3.mp4"></div>
                    <div class="media-item" data-src="service-DLV-4.webp"></div>
                </div>
            </div>

            <div class="service-section" id="service-DPP">
                <div class="service-top">
                    <div class="service-image-container">
                        <img src="service-DPP.webp" alt="拆箱定位" class="service-image">
                    </div>
                    <div class="service-text">
                        <h2>拆箱定位</h2>
                        <p>提供安全快速的物流配送服務，確保貨物準時送達。</p>
                    </div>
                </div>
                <div class="media-row">
                    <iframe
                        class="media-item media-wide" 
                        src="https://www.youtube.com/embed/qjcpychptwY?si=VYCwwKLUA05ogFu7" 
                        title="拆箱" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" 
                        allowfullscreen>
                    </iframe>
                    <div class="media-item" data-src="service-DPP-2.webp"></div>
                </div>
            </div>

            <div class="service-section" id="service-CNB">
                <div class="service-top">
                    <div class="service-image-container">
                        <img src="service-CNB.webp" alt="拆裝貨櫃" class="service-image">
                    </div>
                    <div class="service-text">
                        <h2>拆裝貨櫃</h2>
                        <p>專業團隊協助貨櫃裝卸與貨物整理。</p>
                    </div>
                </div>
                <div class="media-row">
                    <iframe
                        class="media-item media-wide" 
                        src="https://www.youtube.com/embed/ELRR9728NTU?si=twOtmVk4hv5awv-d" 
                        title="拆櫃" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" 
                        allowfullscreen>
                    </iframe>
                </div>
            </div>

            <div class="service-section" id="service-STO">
                <div class="service-top">
                    <div class="service-image-container">
                        <img src="service-STO.webp" alt="貨物寄存" class="service-image">
                    </div>
                    <div class="service-text">
                        <h2>貨物寄存</h2>
                        <p>提供安全可靠的倉儲空間，滿足各種存放需求。</p>
                    </div>
                </div>
                <div class="media-row">
                    <div class="media-item" data-src="service-STO-1.webp"></div>
                    <div class="media-item" data-src="service-STO-2.webp"></div>
                    <div class="media-item" data-src="service-STO-3.webp"></div>
                    <div class="media-item" data-src="service-STO-4.webp"></div>
                    <div class="media-item" data-src="service-STO-5.webp"></div>
                </div>
            </div>

            <div class="service-section" id="service-ASM">
                <div class="service-top">
                    <div class="service-image-container">
                        <img src="service-ASM.webp" alt="家具組裝" class="service-image">
                    </div>
                    <div class="service-text">
                        <h2>家具組裝</h2>
                        <p>提供家具拆裝與組裝服務，讓搬運更輕鬆。</p>
                    </div>
                </div>
                <div class="media-row">
                    <div class="media-item" data-src="service-ASM-1.webp"></div>
                    <div class="media-item" data-src="service-ASM-2.webp"></div>
                    <div class="media-item" data-src="service-ASM-3.webp"></div>
                    <div class="media-item" data-src="service-ASM-4.webp"></div>
                    <div class="media-item" data-src="service-ASM-5.webp"></div>
                </div>
            </div>

            <div class="service-section" id="service-CSP">
                <div class="service-top">
                    <div class="service-image-container">
                        <img src="service-CSP.webp" alt="商業空間" class="service-image">
                    </div>
                    <div class="service-text">
                        <h2>商業空間</h2>
                        <p>提供家具拆裝與組裝服務，讓搬運更輕鬆。</p>
                    </div>
                </div>
                <div class="media-row">
                    <div class="media-item" data-src="service-CSP-1.webp"></div>
                    <div class="media-item" data-src="service-CSP-2.webp"></div>
                    <div class="media-item" data-src="service-CSP-3.webp"></div>
                    <div class="media-item" data-src="service-CSP-4.webp"></div>
                    <div class="media-item" data-src="service-CSP-5.webp"></div>
                </div>
            </div>
        </section>

        <div id="footer"></div>

        <script>
            // 載入 header
            fetch('header.html')
              .then(response => response.text())
              .then(html => document.getElementById('header').innerHTML = html)
              .catch(err => console.log('載入 header 失敗', err));

            // 載入 footer
            fetch('footer.html')
              .then(response => response.text())
              .then(html => document.getElementById('footer').innerHTML = html)
              .catch(err => console.log('載入 footer 失敗', err));
        </script>
    </body>
</html>

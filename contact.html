<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>聯絡我們 - 獅諾物流</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    /* 全域樣式 */
    body {
      margin: 0;
      font-family: 'Noto Sans TC', sans-serif;
      background-color: #f1f8fd;
      color: #333;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 40px;
      background-color: #0D1B2A;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }

    .brand {
      display: flex;
      align-items: center;
    }

    .logo {
      width: 100%;
      max-width: 360px;
      height: auto;
    }

    .nav-bar {
      display: flex;
      gap: 30px;
    }

    .nav-bar a {
      text-decoration: none;
      color: #ffffff;
      font-size: 18px;
      transition: color 0.3s;
    }

    .nav-bar a:hover {
      color: #C9A227;
    }

    /* 主內容區 */
    .main-content {
      text-align: center;
      padding: 50px 20px;
      background-color: #fff;
      margin: 40px auto;
      max-width: 1200px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .main-content h1 {
      font-size: 36px;
      color: #0D1B2A;
      margin-bottom: 30px;
    }

    .main-content h2 {
      font-size: 28px;
      color: #0D1B2A;
      margin-top: 40px;
      margin-bottom: 20px;
    }

    .main-content p {
      font-size: 18px;
      color: #666;
      line-height: 1.8;
      margin-bottom: 20px;
    }

    /* 聯絡表單 */
    form {
      max-width: 800px;
      margin: 0 auto;
      text-align: left;
    }

    form label {
      display: block;
      font-weight: 600;
      margin-top: 15px;
      margin-bottom: 5px;
    }

    form input, form textarea {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }

    form textarea {
      resize: vertical;
      min-height: 120px;
    }

    form button {
      margin-top: 20px;
      padding: 12px 30px;
      font-size: 18px;
      background-color: #C9A227;
      color: #0D1B2A;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    form button:hover {
      background-color: #a1821b;
    }

    /* Footer 與首頁一致 */
    .contact-section {
      background-color: #0D1B2A;
      color: #ffffff;
      padding: 50px 60px 50px 20px;
      text-align: right;
    }

    .contact-section a {
      font-size: 20px;
      color: #C9A227;
      text-decoration: none;
      font-weight: 600;
    }

    .contact-section span {
      font-size: 20px;
    }

    .line-contact {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 10px;
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        gap: 10px;
      }
      .nav-bar {
        flex-wrap: wrap;
        justify-content: center;
      }
      .contact-section {
        text-align: center;
        padding: 40px 20px;
      }
      .line-contact {
        justify-content: center;
      }
    }

    @media (max-width: 600px) {
      .main-content h1 {
        font-size: 28px;
      }
      .main-content h2 {
        font-size: 22px;
      }
    }

  </style>
</head>
<body>

<header class="header">
  <div class="brand">
    <a href="index.html">

    </a>
  </div>
  <nav class="nav-bar">

  <br>
  <p>© 2026 獅諾物流 版權所有</p>
</section>

</body>
</html>
